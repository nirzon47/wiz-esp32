esphome:
  name: wiz-toggle-button
  includes:
    - <lwip/sockets.h>

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: 'NK Deco_IoT'
  password: 'almost uploaded it lol'
  fast_connect: true

logger:
  level: DEBUG

globals:
  - id: is_light_on
    type: bool
    restore_value: no
    initial_value: 'true'

binary_sensor:
  - platform: gpio
    id: off_button
    pin:
      number: 21
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - lambda: |-
          id(is_light_on) = !id(is_light_on);

          int sock = ::socket(AF_INET, SOCK_DGRAM, IPPROTO_IP);
          if (sock >= 0) {
            struct sockaddr_in dest_addr;
            dest_addr.sin_addr.s_addr = ::inet_addr("192.168.68.53");
            dest_addr.sin_family = AF_INET;
            dest_addr.sin_port = htons(38899);
            
            std::string state_val = id(is_light_on) ? "true" : "false";
            std::string payload = "{\"method\":\"setPilot\",\"params\":{\"state\":" + state_val + "}}";
            
            ::sendto(sock, payload.c_str(), payload.length(), 0, (struct sockaddr *)&dest_addr, sizeof(dest_addr));
            ::lwip_close(sock);
            
            ESP_LOGD("main", "UDP Toggle Sent: %s", state_val.c_str());
          }
